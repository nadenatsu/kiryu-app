<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>桐生・至上命令執行アプリ</title>
    <style>
        :root { --primary: #003366; --accent: #ffcc00; --bg: #f0f2f5; --danger: #d32f2f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; padding-bottom: 50px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { font-size: 15px; margin: 0 0 10px 0; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 8px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        textarea { width: 100%; height: 60px; border: 1px solid #ddd; border-radius: 6px; padding: 8px; box-sizing: border-box; font-size: 13px; margin-bottom: 10px; background: #fafafa; }
        textarea:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button.clear { background: #999; }
        .result-area { background: #fff; padding: 15px; border-radius: 12px; border-top: 5px solid var(--accent); white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; margin-right: 5px; }
        .stable { background: #ffeb3b; color: #000; }
        .mode-b { background: #f44336; color: #fff; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="border:none; text-align:center; font-size:18px;">🔱 桐生・予想執行憲法 🔱</h2>
        <div id="stableToggle" style="text-align:center; margin-bottom:10px;">
            <input type="checkbox" id="isStable" onchange="updateModeBadge()"> 安定板・2周戦モード
        </div>
    </div>

    <div class="card">
        <h2>📑 基本データ（コピペ）</h2>
        <label>1. 出走表（枠・選手・級別）</label>
        <textarea id="data1" placeholder="出走表を貼り付け"></textarea>
        
        <label>2. 節間成績・直近成績</label>
        <textarea id="data2" placeholder="成績データを貼り付け"></textarea>

        <div class="info-grid">
            <div>
                <label>3. 枠別勝率・平均ST</label>
                <textarea id="data3" placeholder="勝率/ST"></textarea>
            </div>
            <div>
                <label>4. 逃がし率・決まり手</label>
                <textarea id="data4" placeholder="逃がし率など"></textarea>
            </div>
        </div>

        <label>5. オリジナル展示タイム（直線・半周・回り足）</label>
        <textarea id="data5" placeholder="オリジナル展示を貼り付け"></textarea>

        <label>6. スタート展示（スリット数値）</label>
        <textarea id="data6" placeholder="スタート展示を貼り付け"></textarea>

        <div class="btn-group">
            <button class="clear" onclick="clearAll()">クリア</button>
            <button onclick="analyzeAll()">最 終 分 析 執 行</button>
        </div>
    </div>

    <div id="resultContainer" class="card" style="display:none;">
        <div id="badges"></div>
        <div id="analysisResult" class="result-area"></div>
    </div>

<script>
function updateModeBadge() {
    console.log("Mode updated");
}

function clearAll() {
    for(let i=1; i<=6; i++) document.getElementById('data'+i).value = '';
    document.getElementById('resultContainer').style.display = 'none';
}

function analyzeAll() {
    const isStable = document.getElementById('isStable').checked;
    const d1 = document.getElementById('data1').value;
    const d4 = document.getElementById('data4').value; // 逃がし率
    const d5 = document.getElementById('data5').value; // オリジナル展示
    const d6 = document.getElementById('data6').value; // スタ連

    // --- 解析ロジック (憲法準拠) ---
    let log = "【憲法執行・最終判断】\n";
    
    // 1. 壁消失特約チェック (第2条)
    let kabeWeak = false;
    const nigashiMatch = d4.match(/2号艇[\s\S]*?逃がし率\s*(\d+(\.\d+)?)%/);
    const nigashiRate = nigashiMatch ? parseFloat(nigashiMatch[1]) : 50;
    if (nigashiRate <= 35) kabeWeak = true;

    // 2. 直線タイム抽出 (第5条)
    const straightTimes = [];
    for(let i=1; i<=6; i++){
        const m = d5.match(new RegExp(`${i}号艇[\\s\\S]*?直線\\s*([\\d.]+)`));
        if(m) straightTimes.push({id: i, val: parseFloat(m[1])});
    }
    straightTimes.sort((a,b) => a.val - b.val);

    // 3. 憲法第7条フローチャート自動回答
    let step1 = "Yes (不安なし)";
    if (d1.includes("1号艇") && d1.includes("B1")) step1 = "No (不安あり)";
    if (kabeWeak) step1 = "No (物理的壁消失)";

    log += `■ ステップ1 (イン不安): ${step1}\n`;
    if (kabeWeak) log += `⚠️ 第2条「壁消失特約」発動(逃がし率:${nigashiRate}%)\n`;

    let step2 = kabeWeak ? "No (カベ機能不全)" : "Yes (カベ存在)";
    log += `■ ステップ2 (カベ判定): ${step2}\n`;

    // 4. 展開・買い目 (第8条)
    let main = "";
    if (step1.includes("Yes")) {
        const himo1 = straightTimes[0].id == 1 ? straightTimes[1].id : straightTimes[0].id;
        main = isStable ? `1-${himo1}, 1-3` : `1-2-34, 1-3-24`;
    } else {
        const attacker = straightTimes[0].id;
        main = `${attacker}-1, ${attacker}-全`;
    }

    // --- 出力表示 ---
    let badgeHtml = "";
    if (isStable) badgeHtml += '<span class="badge stable">安定板・2周戦</span>';
    
    document.getElementById('badges').innerHTML = badgeHtml;
    document.getElementById('analysisResult').innerText = `${log}\n自信度: B\n🔥本線\n${main}\n\n🎯抑え\n1-4-全\n\n※最短航跡特約(第8条)および\n憲法第7条フローに基づく自動生成`;
    document.getElementById('resultContainer').style.display = 'block';
}
</script>
</body>
</html>
