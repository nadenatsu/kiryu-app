<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="bubuicon.png">
    <title>桐生・至上命令執行アプリ</title>
    <style>
        :root { --navy: #001f3f; --gold: #d4af37; --white: #ffffff; --red: #ff4136; --ice: #7fdbff; }
        body { font-family: -apple-system, sans-serif; background: #000; color: var(--white); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; border: 2px solid var(--gold); padding: 8px; margin-bottom: 12px; background: var(--navy); border-radius: 8px; }
        .header h1 { margin: 0; font-size: 16px; color: var(--gold); letter-spacing: 2px; }
        .section { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 10px; border: 1px solid #333; }
        h2 { font-size: 11px; color: var(--gold); margin: 0 0 8px 0; border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 2px; }
        textarea { width: 100%; height: 40px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 6px; font-size: 11px; box-sizing: border-box; margin-bottom: 6px; }
        input, select { background:#222; border:1px solid #444; color:#fff; padding:6px; border-radius:4px; font-size: 11px;}
        .flex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-exec { width: 100%; background: linear-gradient(to bottom, #d4af37, #aa841e); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 5px; }
        .result-box { background: var(--navy); border: 2px solid var(--gold); padding: 15px; margin-top: 15px; border-radius: 8px; display: none; }
        .tips-group { margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .tips-label { font-size: 10px; color: var(--gold); font-weight: bold; }
        .tips-value { font-size: 20px; color: #fff; text-align: center; font-weight: bold; line-height: 1.6; }
        .analysis-log { font-size: 10px; color: var(--ice); margin-bottom: 5px; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🔱 桐生・至上命令執行 🔱</h1></div>

    <div class="section">
        <h2>環境・条件詳細設定</h2>
        <div class="flex-grid">
            <select id="month">
                <option value="winter">12-2月 (冬・赤城おろし)</option>
                <option value="spring">3-5月 (春)</option>
                <option value="summer">6-8月 (夏)</option>
                <option value="autumn">9-11月 (秋)</option>
            </select>
            <select id="time">
                <option value="day">昼 (15-17時)</option>
                <option value="sunset">夕方 (17-19時)</option>
                <option value="night" selected>夜 (19時以降)</option>
            </select>
        </div>
        <div class="flex-grid" style="margin-top:8px;">
            <select id="windDir">
                <option value="oi">追い風</option><option value="mukai">向かい風</option>
                <option value="migiyoko">右横風</option><option value="hidariyoko">左横風</option>
            </select>
            <input type="number" id="wind" value="0" placeholder="風速(m)" max="10">
        </div>
        <div style="margin-top:10px; display: flex; gap: 20px; justify-content: center; font-size: 11px;">
            <label><input type="checkbox" id="stable"> 安定板</label>
            <label><input type="checkbox" id="lap2"> 2周戦</label>
        </div>
    </div>

    <div class="section">
        <h2>📑 憲法用データ入力 (全7項目)</h2>
        <textarea id="d1" placeholder="1. 出走表 (級別・選手名)"></textarea>
        <textarea id="d2" placeholder="2. 節間成績 / 枠別10走"></textarea>
        <textarea id="d3" placeholder="3. 枠別勝率 / 平均ST"></textarea>
        <textarea id="d4" placeholder="4. 逃がし率・決まり手"></textarea>
        <textarea id="d5" placeholder="5. オリジナル展示タイム"></textarea>
        <textarea id="d6" placeholder="6. スタート展示数値 (例: 1 .12)"></textarea>
        <textarea id="rankingData" placeholder="7. モーター・ボートランキング"></textarea>
    </div>

    <button class="btn-exec" onclick="executeFinalConstitution()">最 終 分 析 執 行</button>

    <div id="result" class="result-box">
        <div id="log-text" class="analysis-log"></div>
        <div class="tips-group"><div class="tips-label">🔥 本線 (3連単・的中優先)</div><div id="main-tips" class="tips-value"></div></div>
        <div class="tips-group"><div class="tips-label">🎯 抑え (自信順)</div><div id="osae-tips" class="tips-value"></div></div>
    </div>
</div>

<script>
function executeFinalConstitution() {
    const d1 = document.getElementById('d1').value;
    const d4 = document.getElementById('d4').value;
    const d5 = document.getElementById('d5').value;
    const d6 = document.getElementById('d6').value;
    const rankingText = document.getElementById('rankingData').value;
    
    const wind = parseInt(document.getElementById('wind').value || 0);
    const windDir = document.getElementById('windDir').value;
    const month = document.getElementById('month').value;
    const time = document.getElementById('time').value;
    const isStable = document.getElementById('stable').checked;
    const isLap2 = document.getElementById('lap2').checked;

    // 1. スリット数値解析
    const sts = [];
    for(let i=1; i<=6; i++) {
        const m = d6.match(new RegExp(`${i}\\s*\\.\\s*(\\d+)`)) || d6.match(new RegExp(`${i}コース.*?(\\d+)`));
        sts.push(m ? parseInt(m[1]) : 15);
    }
    const is1Late = sts[0] > 22 || (sts[0] > sts[1] + 7);

    // 2. モーター・ボートランキング解析
    const rateMap = {};
    rankingText.split('\n').forEach(line => {
        const match = line.match(/\|\s*\*\*(\d+)\*\*\s*\|\s*([\d.]+)/);
        if(match) rateMap[match[1]] = parseFloat(match[2]);
    });

    // 3. 憲法に基づいた艇別パワー計算
    const boats = [];
    for(let i=1; i<=6; i++){
        const mNumMatch = d1.match(new RegExp(`${i}号艇[\\s\\S]*?モーター\\s*(\\d+)`));
        const straightMatch = d5.match(new RegExp(`${i}号艇[\\s\\S]*?直線\\s*([\\d.]+)`));
        const halfMatch = d5.match(new RegExp(`${i}号艇[\\s\\S]*?半周\\s*([\\d.]+)`));
        
        let powerScore = rateMap[mNumMatch ? mNumMatch[1] : null] || 30.0;
        const straightTime = straightMatch ? parseFloat(straightMatch[1]) : 6.80;
        const halfTime = halfMatch ? parseFloat(halfMatch[1]) : 18.50;

        // オリジナル展示のスコア化 (低い方が良い)
        powerScore += (6.90 - straightTime) * 100;
        if(isLap2) powerScore += (18.80 - halfTime) * 50;

        // 環境補正
        if(time === "night") powerScore += 2;
        if(month === "winter" && windDir === "mukai") powerScore -= 2; // 波乱要因
        
        boats.push({id: i, score: powerScore, st: sts[i-1]});
    }

    // スコア順に並び替え (1号艇以外)
    const rivals = [...boats].filter(b => b.id !== 1).sort((a,b) => b.score - a.score);
    
    const nigashi = parseFloat((d4.match(/2号艇[\s\S]*?逃がし率\s*(\d+)/) || [0,45])[1]);
    const is1A = d1.includes("A1") || d1.includes("A2");
    const isIndefense = is1A && (nigashi >= 38) && !is1Late;

    // 買い目生成ロジック (憲法反映版)
    const generate = (first, second, third) => `${first}-${second}-${third}`;

    let main = [], osae = [];
    if (isIndefense) {
        // 逃げ本線：2着候補は機力上位と2,3号艇
        const himo1 = rivals[0].id; // 機力1位
        const himo2 = (himo1 === 2) ? rivals[1].id : 2;
        const himo3 = (himo1 === 3 || himo2 === 3) ? rivals[2].id : 3;

        main = [generate(1, himo1, himo2), generate(1, himo1, himo3)];
        osae = [generate(1, 2, 3), generate(1, 3, 2)];
        document.getElementById('log-text').innerText = "判定: 憲法に基づきイン逃げ";
    } else {
        // 波乱/攻め：機力1位を軸にする
        const atk = rivals[0].id;
        const himo1 = 1;
        const himo2 = rivals[1].id;
        
        main = [generate(atk, 1, himo2), generate(atk, himo2, 1)];
        osae = [generate(1, atk, himo2), generate(atk, rivals[1].id, rivals[2].id)];
        document.getElementById('log-text').innerText = "判定: 機力・スリット優勢艇の攻め";
    }

    document.getElementById('main-tips').innerText = main.join(' / ');
    document.getElementById('osae-tips').innerText = osae.join(' / ');
    document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
